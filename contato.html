<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Bridge | Contato</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">English Bridge</a>
      <nav class="site-nav" aria-label="Menu principal">
        <a href="index.html">Home</a>
        <a href="sobre.html">Sobre</a>
        <a class="active" href="contato.html">Contato</a>
      </nav>
    </div>
  </header>

  <main class="container site-main">
    <section class="card">
      <h1>Entre em contato</h1>
      <p>Preencha o formulario abaixo e nossa equipe retornara em breve.</p>

      <form class="contact-form" action="#" method="post">
        <p>
          <label for="nome">Nome</label><br>
          <input type="text" id="nome" name="nome" required>
        </p>
        <p>
          <label for="email">Email</label><br>
          <input type="email" id="email" name="email" required>
        </p>
        <p>
          <label for="mensagem">Mensagem</label><br>
          <textarea id="mensagem" name="mensagem" rows="5" required></textarea>
        </p>
        <button class="btn" type="submit">Enviar</button>
      </form>
    </section>

    <section class="card">
      <h2>Contatos rapidos</h2>
      <p>
        Instagram:
        <a href="https://www.instagram.com/englishbridge.school" target="_blank" rel="noopener noreferrer">
          @englishbridge.school
        </a>
      </p>
      <p>
        Email:
        <a href="mailto:contato@englishbridge.com.br">contato@englishbridge.com.br</a>
      </p>
      <p>
        Telefone:
        <a href="tel:+5511999999999">+55 11 99999-9999</a>
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>English Bridge - 2026</p>
      <p>Todos os direitos reservados.</p>
    </div>
  </footer>
</body>
</html>
